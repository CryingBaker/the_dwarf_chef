name: the_dwarf_chef
description: "A new Flutter project."
publish_to: 'none'  # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # Cupertino icons for iOS style icons
  cupertino_icons: ^1.0.8

  # Firebase core for initialization
  firebase_core: ^3.9.0

  # Firebase authentication for user login/signup
  firebase_auth: ^5.3.4

  # Cloud Firestore to store and retrieve recipe data
  cloud_firestore: ^5.5.0

  # Firebase storage if you plan to upload images
  firebase_storage: ^12.4.4

  # HTTP package for making API calls (e.g., to your AI chatbot)
  http: ^1.3.0

  google_fonts: ^6.2.1
  firebase_auth_platform_interface: ^7.3.0
  firebase_auth_web: ^5.8.13

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Recommended linting rules for Flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # # Add assets (e.g., images) by specifying the directory
  assets:
    - images/
